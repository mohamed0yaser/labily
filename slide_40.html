<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body {
            width: 100vw;
            height: 100vh;
            min-width: 100vw;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background-color: #0B1F3B;
            color: #FFFFFF;
            overflow: hidden;
            box-sizing: border-box;
            font-size: 24px;
        }
        h1 { font-size: 64px; }
        h2 { font-size: 48px; }
        .slide-container { font-size: 1.0em; }
        @media (max-width: 900px) {
            html, body { font-size: 18px; }
            h1 { font-size: 40px; }
            h2 { font-size: 32px; }
            .slide-container { font-size: 1.2em; }
        }
        @media (max-width: 600px) {
            html, body { font-size: 16px; }
            h1 { font-size: 28px; }
            h2 { font-size: 22px; }
            .slide-container { font-size: 1em; }
        }
    </style>
</body>
</html>
